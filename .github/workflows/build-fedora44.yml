name: 构建 Fedora 44 RootFS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (对应 kernel-bundle 标签，如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: echo "release_tag=fedora44-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Fedora 44 RootFS - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🐧 Fedora 44 (ARM64) RootFS
            - **内核版本**: ${{ github.event.inputs.kernel_version }}
            - **桌面**: GNOME (GDM)
            - **用户**: luser / 密码: luser ; root / 密码: 1234
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-fedora:
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y qemu-user-static debootstrap p7zip-full dpkg dnf
      - name: Fix DNS resolution (workaround for Fedora mirrors)
        run: |
          # 备份原始 resolv.conf
          sudo cp /etc/resolv.conf /etc/resolv.conf.bak
          # 添加公共 DNS
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf
          # 测试解析
          ping -c 1 mirrors.ustc.edu.cn || true
      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build RootFS (with firmware injection)
        id: build
        run: |
          chmod +x build-fedora44-rootfs.sh
          sudo ./build-fedora44-rootfs.sh ${{ github.event.inputs.kernel_version }}
          echo "filename=$(ls fedora44_*.7z)" >> $GITHUB_OUTPUT
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora44-rootfs
          path: ${{ steps.build.outputs.filename }}
          retention-days: 7
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
