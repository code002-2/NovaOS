name: 🌀 Build Kali Linux

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        type: string
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="kali-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Kali Linux ARM - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Kali Linux ARM For SM8550 (Dual Edition)
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (aarch64) |
            | 系统版本 | Kali Rolling (Latest) |
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.0' }} |
            | 桌面环境 | **GNOME** (GDM3) & **KDE Plasma** (SDDM) |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser` (已配置 sudo 免密)
            - 管理员用户: `root` / 密码: `1234`
            
            ---
            
            ### 📦 镜像文件
            本 Release 包含 GNOME 和 KDE 两个版本的镜像附件。
            解压后请直接使用 fastboot flash 刷入你喜欢的版本。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 🌟 矩阵构建任务
  build-kali:
    name: Build Kali ${{ matrix.desktop }}
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      # 即使一个环境编译失败，也不要取消另一个环境的编译
      fail-fast: false
      matrix:
        desktop: [gnome, kde]

    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: |
          sudo apt update 
          sudo apt install -y libarchive-tools p7zip-full curl wget android-sdk-libsparse-utils
          docker --version

      - name: Download kernel and system bundles
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          gh release download "kernel-bundle-${KERNEL_VER}" \
            --repo "${{ github.repository }}" --clobber || true
            
          wget -q -O mesa-common-dev_26.0.7-1_arm64.deb "http://ftp.br.debian.org/debian/pool/main/m/mesa/mesa-common-dev_26.0.7-1_arm64.deb"
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS (${{ matrix.desktop }})
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          chmod +x sheng-kali-rootfs_build.sh
          # 🌟 这里将矩阵参数 ${{ matrix.desktop }} 作为第三个参数传给脚本
          sudo ./sheng-kali-rootfs_build.sh kali ${KERNEL_VER} ${{ matrix.desktop }}
          
          # 动态捕捉对应的压缩包
          SEVEN_Z_FILE=$(ls kali_${{ matrix.desktop }}_desktop_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kali-desktop-${{ matrix.desktop }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
