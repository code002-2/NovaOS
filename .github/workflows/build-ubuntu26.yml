name: 🐧 Build Ubuntu 26.04 Desktop (GNOME/KDE/Xfce)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="ubuntu26-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Ubuntu 26.04 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🐧 Ubuntu 26.04 LTS (Resolute Raccoon) Desktop
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | Ubuntu版本 | 26.04 LTS (Resolute) |
            | 内核版本 | ${{ github.event.inputs.kernel_version }} |
            | 桌面环境 | GNOME, KDE Plasma, Xfce |
            
            ---
            
            ### 🔐 默认凭据
            - 用户名: `luser`
            - 密码: `luser`
            
            ---
            
            ### 🌐 语言环境
            - 系统语言: 英文 (en_US.UTF-8)
            
            ---
            
            ### 📦 镜像文件
            构建完成后将出现在下方附件中。
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Ubuntu 26.04 Desktop (${{ matrix.desktop_env }})
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    strategy:
      matrix:
        desktop_env: [gnome, kde, xfce]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl

      - name: Download kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          ls -la *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          chmod +x build-ubuntu26-rootfs.sh
          sudo ./build-ubuntu26-rootfs.sh ${{ github.event.inputs.kernel_version }} ${{ matrix.desktop_env }}
          
          # 找出生成的 .7z 压缩包和未压缩的原始 .img 镜像文件
          SEVEN_Z_FILE=$(ls ubuntu26_${{ matrix.desktop_env }}_*.7z | head -1)
          ORIGINAL_IMG=$(ls ubuntu26_${{ matrix.desktop_env }}_*.img | head -1)
          
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
          echo "img_path=$ORIGINAL_IMG" >> $GITHUB_OUTPUT

      - name: 🩹 🧠 自动化联动防御：深度拦截并加固 KDE 图形引导 (防止 sddm 卡死)
        if: matrix.desktop_env == 'kde'
        run: |
          # 提取上一步识别出的原始 .img 文件
          KDE_IMG="${{ steps.build.outputs.img_path }}"
          
          if [ -f "$KDE_IMG" ]; then
            echo "🔧 发现刚生成的未压缩 KDE 镜像: $KDE_IMG，执行防挂起开机修复..."
            mkdir -p mnt_repair
            sudo mount -o loop "$KDE_IMG" mnt_repair
            
            # 【核心修复 1】强制锁死 sddm 为稳健的 X11 模式（主线化早期由于显示管道 DRM 初始化延迟，Wayland 容易在开机阶段直接崩溃）
            sudo mkdir -p mnt_repair/etc/sddm.conf.d
            sudo cat > mnt_repair/etc/sddm.conf.d/ubuntu-defaults.conf <<EOF
[General]
DisplayServer=x11
InputMethod=
EOF

            # 【核心修复 2】强制修正 sddm 自动登录机制，严防找不到默认 Session
            sudo cat > mnt_repair/etc/sddm.conf.d/autologin.conf <<EOF
[Autologin]
User=luser
Session=plasma
EOF

            # 【核心修复 3】为 sddm 基础服务用户指派 video 与 render 渲染权限组，保证其有权调用 Freedreno/Mesa 的显卡硬件加速
            if chroot mnt_repair id -u sddm >/dev/null 2>&1; then
              sudo chroot mnt_repair usermod -aG video,render,input sddm || true
            fi

            # 【核心修复 4】在全局 xdg 级禁用 Plasma 电源息屏与休眠（拦截由于主线 Deep Sleep 尚未健全导致的系统假死或崩溃）
            sudo mkdir -p mnt_repair/etc/xdg
            sudo cat > mnt_repair/etc/xdg/plasmarc <<EOF
[PowerManagement]
ScreenBlanking=false
DisplaySleep=0
EOF

            # 安全同步、解锁并卸载挂载点
            sudo sync
            sudo umount -l mnt_repair
            rm -rf mnt_repair
            
            # 【重新打包】由于修改了镜像内部内容，需要删除脚本原本生成的旧 7z 包，并重新打包最新的加固镜像
            echo "🗜️ 正在重新压缩加固后的完美版 KDE 镜像..."
            rm -f "${{ steps.build.outputs.path }}" || true
            7z a "${{ steps.build.outputs.path }}" "$KDE_IMG"
            
            echo "✅ KDE 镜像引导修复手术顺利完成！"
          else
            echo "⚠️ 错误：未检测到可用的未压缩原始 KDE 镜像，跳过加固过程！"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu26-${{ matrix.desktop_env }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
