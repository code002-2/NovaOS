name: Build Deepin 25 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.1'
      kernel_channel:
        description: '内核通道'
        required: true
        type: choice
        options: [mainline, stable]
        default: 'mainline'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'deepin-rootfs_build.sh'
      - 'lib/rootfs-common.sh'
      - '.github/workflows/build-deepin.yml'
      - '.github/workflows/_rootfs-template.yml'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_rootfs-template.yml
    with:
      distro: deepin
      script: deepin-rootfs_build.sh
      kernel_version_default: '7.1'
      kernel_channel_default: 'mainline'
      desktop_matrix: '["all"]'
      release_tag_prefix: deepin
      release_body_title: "Deepin 25 Desktop"
      skip_release: ${{ github.event.inputs.skip_release }}
    secrets: inherit
