name: 🌀 Build Deepin 25.1.0 Desktop

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (如 7.0)'
        required: true
        default: '7.0'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04-arm
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: Generate release tag
        id: tag
        run: |
          TAG="deepin25.1.0-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "Deepin 25.1.0 Desktop - ${{ steps.tag.outputs.release_tag }}"
          body: |
            🌀 Deepin 25.1.0 (Latest) OS For SM8550
            
            ---
            
            ### 📋 构建信息
            | 项目 | 详情 |
            |------|------|
            | 架构 | ARM64 (arm64) |
            | 内核版本 | ${{ github.event.inputs.kernel_version || '7.0' }} |
            | 操作系统 | Deepin 25.1.0 (dde) |
            
            ---
            
            ### 🔐 默认凭据
            - 普通用户: `luser` / 密码: `luser`
            - 管理员用户: `root` / 密码: `1234`
            
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deepin:
    name: Build Deepin 25.1.0 RootFS
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        run: sudo apt update && sudo apt install -y debootstrap p7zip-full curl

      - name: Download kernel bundle
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          gh release download "kernel-bundle-${KERNEL_VER}" --pattern "*.deb" --repo "${{ github.repository }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RootFS
        id: build
        run: |
          KERNEL_VER="${{ github.event.inputs.kernel_version }}"
          if [ -z "$KERNEL_VER" ]; then KERNEL_VER="7.0"; fi
          
          chmod +x deepin-rootfs_build.sh
          sudo ./deepin-rootfs_build.sh deepin ${KERNEL_VER}
          
          # 捕捉打包生成的 7z 文件
          SEVEN_Z_FILE=$(ls deepin25_1_0_desktop_*.7z | head -1)
          echo "filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepin-25-1-0-desktop
          path: ${{ steps.build.outputs.path }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          files: ${{ steps.build.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
