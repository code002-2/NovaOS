name: Build Gaming OS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.1'
      kernel_channel:
        description: '内核通道'
        required: true
        type: choice
        options: [mainline, stable]
        default: 'mainline'
      launcher:
        description: '游戏启动器'
        required: true
        type: choice
        options: [both, retroarch, steam]
        default: 'both'
      output_type:
        description: '输出类型'
        required: true
        type: choice
        options: [sd, image]
        default: 'sd'
      skip_release:
        description: '跳过创建 GitHub Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'sheng-gaming-os_build.sh'
      - 'lib/gaming-packages.sh'
      - 'lib/rootfs-common.sh'
      - '.github/workflows/build-gaming-os.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: "构建 Gaming OS (${{ inputs.launcher || 'both' }})"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 生成 Release Tag
        id: tag
        run: |
          TAG="gaming-os-$(date -u '+%Y%m%d')-${GITHUB_SHA::8}"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT

      - name: 缓存 apt 包
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-gaming-os-${{ hashFiles('.github/workflows/build-gaming-os.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-gaming-os-
            ${{ runner.os }}-apt-

      - name: 安装构建工具
        run: |
          sudo apt update
          sudo apt install -y p7zip-full curl wget android-sdk-libsparse-utils

      - name: 下载内核 Bundle
        run: |
          KERNEL_VER="${{ inputs.kernel_version || '7.1' }}"
          KERNEL_CHANNEL="${{ inputs.kernel_channel || 'mainline' }}"

          echo "下载内核 Bundle: channel=${KERNEL_CHANNEL} version=${KERNEL_VER}"

          # 尝试通道前缀 tag，回退到纯版本 tag
          BUNDLE_TAG="kernel-bundle-${KERNEL_CHANNEL}-${KERNEL_VER}"
          if ! gh release view "$BUNDLE_TAG" \
              --repo "${{ github.repository }}" > /dev/null 2>&1; then
            BUNDLE_TAG="kernel-bundle-${KERNEL_VER}"
            if ! gh release view "$BUNDLE_TAG" \
                --repo "${{ github.repository }}" > /dev/null 2>&1; then
              echo "错误: 内核 Bundle 发布不存在！" >&2
              echo "尝试过的 tags: $BUNDLE_TAG, kernel-bundle-${KERNEL_CHANNEL}-${KERNEL_VER}" >&2
              echo "请先通过 'Build Kernel' + 'Build Kernel Bundle' workflow 构建内核。" >&2
              exit 1
            fi
          fi

          gh release download "$BUNDLE_TAG" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber

          echo "下载的内核包:"
          ls -lah *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 缓存 Fedora OCI 镜像
        uses: actions/cache@v4
        with:
          path: fedora-44-container.oci.tar.xz
          key: fedora-oci-44-${{ hashFiles('sheng-gaming-os_build.sh') }}
          restore-keys: |
            fedora-oci-44-

      - name: 构建 Gaming OS
        id: build
        run: |
          KERNEL_VER="${{ inputs.kernel_version || '7.1' }}"
          LAUNCHER="${{ inputs.launcher || 'both' }}"
          OUTPUT_TYPE="${{ inputs.output_type || 'sd' }}"

          chmod +x sheng-gaming-os_build.sh lib/gaming-packages.sh lib/rootfs-common.sh
          sudo bash sheng-gaming-os_build.sh "$KERNEL_VER" "$LAUNCHER" "$OUTPUT_TYPE"

          # 收集产物
          IMG_COUNT=$(ls -1 *.img 2>/dev/null | wc -l)
          SD_COUNT=$(find sheng-gaming-os_sd_* -name "*.img" 2>/dev/null | wc -l)
          SEVENZ_COUNT=$(ls -1 *.7z 2>/dev/null | wc -l)

          echo "img_count=$IMG_COUNT" >> $GITHUB_OUTPUT
          echo "sd_count=$SD_COUNT" >> $GITHUB_OUTPUT
          echo "sevenz_count=$SEVENZ_COUNT" >> $GITHUB_OUTPUT

          echo "构建产物: img=$IMG_COUNT, sd=$SD_COUNT, 7z=$SEVENZ_COUNT"

      - name: 上传 RootFS 镜像
        if: steps.build.outputs.sevenz_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: gaming-os-rootfs-${{ inputs.launcher || 'both' }}
          path: "*.7z"
          retention-days: 7
          if-no-files-found: warn

      - name: 上传 SD 卡镜像
        if: steps.build.outputs.sd_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: gaming-os-sd-${{ inputs.launcher || 'both' }}
          path: |
            sheng-gaming-os_sd_*/xiaomi-sheng-gaming-os.img
            sheng-gaming-os_sd_*/flash_sd.sh
          retention-days: 7
          if-no-files-found: warn

      - name: 上传包列表
        uses: actions/upload-artifact@v4
        with:
          name: gaming-os-pkglist-${{ inputs.launcher || 'both' }}
          path: sheng-gaming-os_packages_*.txt
          retention-days: 7
          if-no-files-found: ignore

  create-release:
    name: "创建 Release"
    runs-on: ubuntu-24.04-arm
    needs: [build]
    if: ${{ inputs.skip_release != true && needs.build.result == 'success' }}
    steps:
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: "Gaming OS - ${{ needs.build.outputs.release_tag }}"
          body: |
            **ROCKNIX+Armada 混合游戏系统**

            | 项目 | 详情 |
            |------|------|
            | 发行版 | Fedora 44 |
            | 内核版本 | ${{ inputs.kernel_version || '7.1' }} |
            | 内核通道 | ${{ inputs.kernel_channel || 'mainline' }} |
            | 启动器 | ${{ inputs.launcher || 'both' }} |
            | 构建SHA | [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

            ### 包含组件
            - RetroArch + 30+ libretro 核心
            - EmulationStation Desktop Edition
            - Steam + FEX-Emu (aarch64 x86_64 游戏)
            - Gamescope 微合成器
            - MangoHud 性能监视
            - 手柄/控制器支持
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载 RootFS 产物
        uses: actions/download-artifact@v4
        with:
          pattern: gaming-os-rootfs-*
          merge-multiple: true

      - name: 下载 SD 卡产物
        uses: actions/download-artifact@v4
        with:
          pattern: gaming-os-sd-*
          merge-multiple: true

      - name: 上传 RootFS 到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          files: "*.7z"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 SD 卡镜像到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          files: |
            xiaomi-sheng-gaming-os.img
            flash_sd.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布 Release
        run: |
          TAG="${{ needs.build.outputs.release_tag }}"

          # 构建产物清单
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null || echo "")

          {
            echo "### 构建产物"
            echo ""
            if [ -n "$ASSETS" ]; then
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  SIZE=$(gh release view "$TAG" --json assets --jq ".assets[] | select(.name==\"$asset\") | .sizeBytes" 2>/dev/null || echo "?")
                  if [ "$SIZE" != "?" ] && [ "$SIZE" -gt 0 ] 2>/dev/null; then
                    HUMAN_SIZE=$((SIZE / 1024 / 1024))
                    echo "- \`$asset\` (~${HUMAN_SIZE}MB)" >> /tmp/release_body.md
                  else
                    echo "- \`$asset\`" >> /tmp/release_body.md
                  fi
                fi
              done <<< "$ASSETS"
            fi

            echo ""
            echo "---"
            echo "**构建时间**: $(date -u '+%Y-%m-%d %H:%M UTC')"
          } > /tmp/release_body.md

          EXISTING_BODY=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")
          if [ -n "$EXISTING_BODY" ]; then
            printf '%s\n\n%s' "$EXISTING_BODY" "$(cat /tmp/release_body.md)" > /tmp/combined_body.md
            gh release edit "$TAG" --body-file /tmp/combined_body.md
          else
            gh release edit "$TAG" --body-file /tmp/release_body.md
          fi

          # 发布 draft
          gh release edit "$TAG" --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
