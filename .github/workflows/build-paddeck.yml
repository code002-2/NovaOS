name: Build PadDeck OS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本'
        required: true
        default: '7.1'
      kernel_channel:
        description: '内核通道'
        required: true
        type: choice
        options: [mainline, stable]
        default: 'mainline'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false
  push:
    branches: [main, master]
    paths:
      - 'paddeck-rootfs_build.sh'
      - 'lib/rootfs-common.sh'
      - '.github/workflows/build-paddeck.yml'
      - '.github/workflows/_rootfs-template.yml'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/_rootfs-template.yml
    with:
      distro: paddeck
      script: padeck-rootfs_build.sh
      kernel_version_default: '7.1'
      kernel_channel_default: 'mainline'
      desktop_matrix: '["all"]'
      release_tag_prefix: paddeck
      release_body_title: "PadDeck OS (Steam Gaming)"
      skip_release: ${{ github.event.inputs.skip_release }}
    secrets: inherit
