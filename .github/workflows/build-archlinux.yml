name: 🐧 构建Arch linux rootfs (测试 酌情使用)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本（对应 Debian kernel-bundle 标签，如 7.0）'
        required: true
        default: '7.0'
      build_type:
        description: '构建类型'
        type: choice
        options:
          - all
          - server-only
          - desktop-only
        default: 'all'
      skip_release:
        description: '跳过创建 GitHub Release'
        type: boolean
        default: false

jobs:
  build-server:
    name: Build Arch Linux Server (with firmware)
    runs-on: ubuntu-24.04-arm
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'server-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget p7zip-full dpkg
      - name: Download Debian kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          mkdir -p firmware_extract
          for deb in *.deb; do
            dpkg-deb -x "$deb" firmware_extract/
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Arch Linux RootFS (Server)
        run: |
          chmod +x build-archlinux-rootfs.sh
          sudo ./build-archlinux-rootfs.sh server firmware_extract
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-server-with-firmware
          path: archlinux_server_*.7z
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: archlinux-fw-${{ github.run_number }}
          files: archlinux_server_*.7z

  build-desktop:
    name: Build Arch Linux Desktop (with firmware)
    runs-on: ubuntu-24.04-arm
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'desktop-only'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget p7zip-full dpkg
      - name: Download Debian kernel bundle
        run: |
          gh release download "kernel-bundle-${{ github.event.inputs.kernel_version }}" \
            --pattern "*.deb" --repo "${{ github.repository }}" --clobber
          mkdir -p firmware_extract
          for deb in *.deb; do
            dpkg-deb -x "$deb" firmware_extract/
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Arch Linux RootFS (Desktop)
        run: |
          chmod +x build-archlinux-rootfs.sh
          sudo ./build-archlinux-rootfs.sh desktop firmware_extract
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-desktop-with-firmware
          path: archlinux_desktop_*.7z
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: archlinux-fw-${{ github.run_number }}
          files: archlinux_desktop_*.7z
