name: 🐧 Build Arch Linux RootFS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        type: choice
        options:
          - all
          - server-only
          - desktop-only
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        type: boolean
        default: false

jobs:
  build-arch:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        variant: ${{ 
          github.event.inputs.build_type == 'server-only' && fromJSON('["server"]') ||
          github.event.inputs.build_type == 'desktop-only' && fromJSON('["desktop"]') ||
          fromJSON('["server", "desktop"]')
        }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap arch-install-scripts p7zip-full
      - name: Build RootFS
        id: build
        run: |
          chmod +x build-archlinux-rootfs.sh
          sudo ./build-archlinux-rootfs.sh ${{ matrix.variant }}
          echo "file=$(ls archlinux_*.7z)" >> $GITHUB_OUTPUT
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-${{ matrix.variant }}
          path: archlinux_*.7z
      - name: Upload to Release
        if: ${{ !github.event.inputs.skip_release }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: archlinux-rootfs-${{ github.run_number }}
          files: archlinux_*.7z
