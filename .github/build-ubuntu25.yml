name: 🐧 Build Ubuntu 25.04 RootFS

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: '内核版本 (对应Release标签，如 7.0)'
        required: true
        default: '7.0'
      build_type:
        description: '构建类型选择'
        options:
          - all
          - server-only
          - desktop-only
        required: true
        type: choice
        default: 'all'
      skip_release:
        description: '跳过创建GitHub Release'
        required: false
        type: boolean
        default: false

jobs:
  prepare-release:
    name: "📝 准备Release"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.generate_tag.outputs.release_tag }}
      kernel_version: ${{ steps.kernel_version.outputs.kernel_version }}
    steps:
    - name: "📦 获取内核版本"
      id: kernel_version
      run: |
        KERNEL_VER=${{ github.event.inputs.kernel_version || '7.0' }}
        echo "kernel_version=$KERNEL_VER" >> $GITHUB_OUTPUT

    - name: "🏷️ 生成版本标签"
      id: generate_tag
      run: |
        DATE_TAG=$(date -u '+%Y%m%d')
        KERNEL_REF="${{ steps.kernel_version.outputs.kernel_version }}"
        SHORT_SHA="${GITHUB_SHA:0:8}"
        RELEASE_TAG="ubuntu25-rootfs-$DATE_TAG-$KERNEL_REF-$SHORT_SHA"
        echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

    - name: "📄 提前创建GitHub Release"
      if: ${{ !github.event.inputs.skip_release }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.generate_tag.outputs.release_tag }}
        name: "Ubuntu 25.04 for Sheng - ${{ steps.generate_tag.outputs.release_tag }}"
        body: |
          🐧 Ubuntu 25.04 (Plucky) for Sheng
          
          --- 
          
          ### 📋 构建信息
          | 项目 | 详情 |
          |------|------|
          | Ubuntu版本 | 25.04 (Plucky) |
          | 内核版本 | ${{ steps.kernel_version.outputs.kernel_version }} |
          | 构建SHA | [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |
          | 构建类型 | ${{ github.event.inputs.build_type || 'all' }} |
          | 包含变体 | ${{ 
              github.event.inputs.build_type == 'server-only' && 'Ubuntu Server' ||
              github.event.inputs.build_type == 'desktop-only' && 'Ubuntu Desktop' ||
              'Ubuntu Server, Ubuntu Desktop'
            }} |
          
          --- 
          
          ### 🔐 默认凭据
          
          **服务器版**
          - 用户名: `root`
          - 密码: `1234` (首次登录后请立即修改！)
          
          **桌面版**
          - 用户名: `luser`
          - 密码: `luser`
          - 自动登录: 已启用
          - 桌面环境: GNOME + GDM3
          
          --- 
          
          ### 🛡️ 安全建议
          1. 首次登录后立即修改默认密码
          2. 禁用root远程登录（可选）
          3. 配置防火墙规则

          --- 
          
          ### 📦 镜像文件
          构建中...
        draft: false
        prerelease: false
        files: ""
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ubuntu25:
    name: "🏗️ 构建 Ubuntu 25.04 - ${{ matrix.variant }}"
    runs-on: ubuntu-24.04-arm
    needs: prepare-release
    env:
      APT_CACHE_DIR: /opt/apt-cache
      RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        variant: ${{ 
            (github.event.inputs.build_type == 'server-only')
            && fromJSON('["server"]')
            || (github.event.inputs.build_type == 'desktop-only')
            && fromJSON('["desktop"]')
            || fromJSON('["server", "desktop"]')
            }}
      fail-fast: false

    steps:
    - name: "📥 检出代码"
      uses: actions/checkout@v4

    - name: "🔧 安装构建工具"
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap p7zip-full curl

    - name: "📥 下载内核包 (kernel-bundle)"
      run: |
        KERNEL_VER="${{ needs.prepare-release.outputs.kernel_version }}"
        echo "⬇️ 下载 kernel-bundle-$KERNEL_VER"
        gh release download "kernel-bundle-$KERNEL_VER" \
          --pattern "*.deb" \
          --repo "${{ github.repository }}" \
          --clobber
        ls -lah *.deb
        COUNT=$(ls *.deb | wc -l)
        if [ "$COUNT" -lt 8 ]; then
          echo "❌ 内核包不完整"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "🏗️ 执行 Ubuntu 25.04 RootFS 构建"
      id: build_rootfs
      run: |
        VARIANT="${{ matrix.variant }}"
        KERNEL_VER="${{ needs.prepare-release.outputs.kernel_version }}"
        
        echo "========================================"
        echo "开始构建 Ubuntu 25.04 $VARIANT"
        echo "内核: $KERNEL_VER"
        echo "========================================"
        
        chmod +x build-ubuntu25-rootfs.sh
        sudo bash ./build-ubuntu25-rootfs.sh "$VARIANT" "$KERNEL_VER"
        
        # 查找生成的.7z文件
        SEVEN_Z_FILE=$(find . -maxdepth 1 -name "ubuntu25_*.7z" | head -1)
        if [[ -n "$SEVEN_Z_FILE" ]]; then
          FILE_SIZE=$(du -h "$SEVEN_Z_FILE" | cut -f1)
          echo "✅ 构建产物: $SEVEN_Z_FILE ($FILE_SIZE)"
          echo "final_filename=$(basename "$SEVEN_Z_FILE")" >> $GITHUB_OUTPUT
          echo "file_path=$SEVEN_Z_FILE" >> $GITHUB_OUTPUT
          FILE_SIZE_KB=$(du -k "$SEVEN_Z_FILE" | cut -f1)
          FILE_SIZE_GB=$((FILE_SIZE_KB / 1024 / 1024))
          echo "file_size_gb=$FILE_SIZE_GB" >> $GITHUB_OUTPUT
        else
          echo "❌ 未找到 .7z 文件"
          exit 1
        fi
        
        # 检查是否有boot镜像（如果需要）
        if [[ -f "xiaomi-k20pro-boot.img" ]]; then
          echo "✅ 找到 Boot 镜像"
          echo "boot_img_exists=true" >> $GITHUB_OUTPUT
        fi
      timeout-minutes: 90

    - name: "📤 上传到 Artifact"
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.build_rootfs.outputs.final_filename }}
        path: ${{ steps.build_rootfs.outputs.file_path }}
        retention-days: 14
        if-no-files-found: error
        compression-level: 0

    - name: "🚀 上传到 Release (小文件)"
      if: ${{ !github.event.inputs.skip_release && steps.build_rootfs.outputs.file_size_gb < 2 }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        files: ${{ steps.build_rootfs.outputs.file_path }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: "🚀 上传 Boot 镜像到 Release"
      if: ${{ !github.event.inputs.skip_release && steps.build_rootfs.outputs.boot_img_exists == 'true' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        files: xiaomi-k20pro-boot.img
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release:
    name: "📝 更新Release信息"
    runs-on: ubuntu-24.04-arm
    needs: [prepare-release, build-ubuntu25]
    permissions:
      contents: write
    if: ${{ !github.event.inputs.skip_release }
